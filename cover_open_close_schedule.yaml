blueprint:
  name: Automatic Blinds Management (Sun + MQTT Remote)
  description: >
    Opens blinds at sunrise and closes them at sunset (optional), with support
    for an MQTT remote control device using customizable action subtypes
    (defaults to brightness_move_up / brightness_move_down).
  domain: automation
  input:
    covers:
      name: Covers / Blinds
      description: Select the cover entities to control
      selector:
        entity:
          domain: cover
          multiple: true

    # --- Sun-based triggers ---
    use_sunrise_trigger:
      name: Open at sunrise
      description: Automatically open blinds at sunrise
      default: true
      selector:
        boolean: {}

    use_sunset_trigger:
      name: Close at sunset
      description: Automatically close blinds at sunset
      default: true
      selector:
        boolean: {}

    sunrise_offset:
      name: Sunrise offset
      description: Offset from sunrise in seconds (negative = before, positive = after)
      default: 0
      selector:
        number:
          min: -7200
          max: 7200
          unit_of_measurement: seconds
          step: 60

    sunset_offset:
      name: Sunset offset
      description: Offset from sunset in seconds (negative = before, positive = after)
      default: 0
      selector:
        number:
          min: -7200
          max: 7200
          unit_of_measurement: seconds
          step: 60

    # --- MQTT remote device ---
    mqtt_remote_device:
      name: MQTT remote device
      description: The MQTT device used as a remote control (e.g. Aqara rotary knob)
      selector:
        device:
          integration: mqtt

    open_subtype:
      name: Open action subtype
      description: The action subtype that triggers opening the blinds
      default: "brightness_move_up"
      selector:
        text: {}

    close_subtype:
      name: Close action subtype
      description: The action subtype that triggers closing the blinds
      default: "brightness_move_down"
      selector:
        text: {}

triggers:
  - id: "sunrise"
    trigger: sun
    event: sunrise
    offset: !input sunrise_offset

  - id: "sunset"
    trigger: sun
    event: sunset
    offset: !input sunset_offset

  - id: "mqtt_open"
    trigger: device
    domain: mqtt
    device_id: !input mqtt_remote_device
    type: action
    subtype: !input open_subtype

  - id: "mqtt_close"
    trigger: device
    domain: mqtt
    device_id: !input mqtt_remote_device
    type: action
    subtype: !input close_subtype

conditions: []

actions:
  - choose:
      # OPEN
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: "mqtt_open"
              - condition: and
                conditions:
                  - condition: trigger
                    id: "sunrise"
                  - "{{ use_sunrise_trigger }}"
        sequence:
          - action: cover.open_cover
            target:
              entity_id: !input covers

      # CLOSE
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: "mqtt_close"
              - condition: and
                conditions:
                  - condition: trigger
                    id: "sunset"
                  - "{{ use_sunset_trigger }}"
        sequence:
          - action: cover.close_cover
            target:
              entity_id: !input covers

variables:
  use_sunrise_trigger: !input use_sunrise_trigger
  use_sunset_trigger: !input use_sunset_trigger

mode: single


