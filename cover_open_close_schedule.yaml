blueprint:
  name: Automatic Blinds Management (Sun + MQTT Remote)
  description: >
    Opens blinds at sunrise and closes them at sunset (optional), with support
    for up to 3 MQTT remote control devices using customizable action subtypes
    (defaults to brightness_move_up / brightness_move_down).
  domain: automation
  input:
    covers:
      name: Covers / Blinds
      description: Select the cover entities to control
      selector:
        entity:
          domain: cover
          multiple: true

    # --- Sun-based triggers ---
    use_sunrise_trigger:
      name: Open at sunrise
      description: Automatically open blinds at sunrise
      default: true
      selector:
        boolean: {}

    use_sunset_trigger:
      name: Close at sunset
      description: Automatically close blinds at sunset
      default: true
      selector:
        boolean: {}

    sunrise_offset:
      name: Sunrise offset
      description: Offset from sunrise in seconds (negative = before, positive = after)
      default: 0
      selector:
        number:
          min: -7200
          max: 7200
          unit_of_measurement: seconds
          step: 60

    sunset_offset:
      name: Sunset offset
      description: Offset from sunset in seconds (negative = before, positive = after)
      default: 0
      selector:
        number:
          min: -7200
          max: 7200
          unit_of_measurement: seconds
          step: 60

    # --- MQTT remote device 1 ---
    mqtt_remote_device_1:
      name: MQTT remote device 1
      description: The first MQTT device used as a remote control
      selector:
        device:
          integration: mqtt

    open_subtype_1:
      name: Open action subtype (remote 1)
      description: The action subtype that triggers opening the blinds (remote 1)
      default: "brightness_move_up"
      selector:
        text: {}

    close_subtype_1:
      name: Close action subtype (remote 1)
      description: The action subtype that triggers closing the blinds (remote 1)
      default: "brightness_move_down"
      selector:
        text: {}

    # --- MQTT remote device 2 (optional) ---
    mqtt_remote_device_2:
      name: MQTT remote device 2 (optional)
      description: A second MQTT device used as a remote control (leave empty if not needed)
      default: ""
      selector:
        device:
          integration: mqtt

    open_subtype_2:
      name: Open action subtype (remote 2)
      description: The action subtype that triggers opening the blinds (remote 2)
      default: "brightness_move_up"
      selector:
        text: {}

    close_subtype_2:
      name: Close action subtype (remote 2)
      description: The action subtype that triggers closing the blinds (remote 2)
      default: "brightness_move_down"
      selector:
        text: {}

    # --- MQTT remote device 3 (optional) ---
    mqtt_remote_device_3:
      name: MQTT remote device 3 (optional)
      description: A third MQTT device used as a remote control (leave empty if not needed)
      default: ""
      selector:
        device:
          integration: mqtt

    open_subtype_3:
      name: Open action subtype (remote 3)
      description: The action subtype that triggers opening the blinds (remote 3)
      default: "brightness_move_up"
      selector:
        text: {}

    close_subtype_3:
      name: Close action subtype (remote 3)
      description: The action subtype that triggers closing the blinds (remote 3)
      default: "brightness_move_down"
      selector:
        text: {}

triggers:
  - id: "sunrise"
    trigger: sun
    event: sunrise
    offset: !input sunrise_offset

  - id: "sunset"
    trigger: sun
    event: sunset
    offset: !input sunset_offset

  - id: "mqtt_open_1"
    trigger: device
    domain: mqtt
    device_id: !input mqtt_remote_device_1
    type: action
    subtype: !input open_subtype_1

  - id: "mqtt_close_1"
    trigger: device
    domain: mqtt
    device_id: !input mqtt_remote_device_1
    type: action
    subtype: !input close_subtype_1

  - id: "mqtt_open_2"
    trigger: device
    domain: mqtt
    device_id: !input mqtt_remote_device_2
    type: action
    subtype: !input open_subtype_2

  - id: "mqtt_close_2"
    trigger: device
    domain: mqtt
    device_id: !input mqtt_remote_device_2
    type: action
    subtype: !input close_subtype_2

  - id: "mqtt_open_3"
    trigger: device
    domain: mqtt
    device_id: !input mqtt_remote_device_3
    type: action
    subtype: !input open_subtype_3

  - id: "mqtt_close_3"
    trigger: device
    domain: mqtt
    device_id: !input mqtt_remote_device_3
    type: action
    subtype: !input close_subtype_3

conditions: []

actions:
  - choose:
      # OPEN
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: "mqtt_open_1"
              - condition: trigger
                id: "mqtt_open_2"
              - condition: trigger
                id: "mqtt_open_3"
              - condition: and
                conditions:
                  - condition: trigger
                    id: "sunrise"
                  - "{{ use_sunrise_trigger }}"
        sequence:
          - action: cover.open_cover
            target:
              entity_id: !input covers

      # CLOSE
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: "mqtt_close_1"
              - condition: trigger
                id: "mqtt_close_2"
              - condition: trigger
                id: "mqtt_close_3"
              - condition: and
                conditions:
                  - condition: trigger
                    id: "sunset"
                  - "{{ use_sunset_trigger }}"
        sequence:
          - action: cover.close_cover
            target:
              entity_id: !input covers

variables:
  use_sunrise_trigger: !input use_sunrise_trigger
  use_sunset_trigger: !input use_sunset_trigger

mode: single
