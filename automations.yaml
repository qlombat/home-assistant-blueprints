  alias: Surchauffe
  description: ''
  trigger:
  - platform: time_pattern
    minutes: /10
  condition:
  - condition: and
    conditions:
    - condition: numeric_state
      entity_id: weather.forecast_home
      attribute: temperature
      above: 20
    - condition: numeric_state
      entity_id: sun.sun
      attribute: azimuth
      above: 120
      below: 250
    - condition: sun
      after: sunrise
      before: sunset
    - condition: state
      entity_id: input_boolean.overheat
