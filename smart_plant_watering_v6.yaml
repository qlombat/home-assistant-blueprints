blueprint:
  name: "Smart Adaptive Plant Watering"
  description: >
    Intelligent automatic watering that adapts duration based on:
    - Current and forecasted temperature
    - Number of consecutive dry days (no significant rain)
    - Relative humidity
    - Recent or forecasted rain
    - Wind speed (evaporation)
    Baseline: 1h = normal daily watering needs.
    Uses a weather entity (e.g. IRM KMI Belgium) as data source.
  domain: automation
  input:
    # --- Control entities ---
    watering_switch:
      name: "Watering Switch/Valve"
      description: "The switch entity that controls watering"
      selector:
        entity:
          domain: switch

    # --- Trigger ---
    watering_time:
      name: "Watering time"
      description: "Trigger time (early morning recommended)"
      default: "06:00:00"
      selector:
        time: {}

    # --- Weather source ---
    weather_entity:
      name: "Weather entity"
      description: >
        Weather integration entity (e.g. weather.irm_kmi_home for IRM Belgium,
        or weather.openweathermap). Must provide temperature, humidity, wind_speed attributes.
      default: "weather.irm_kmi_home"
      selector:
        entity:
          domain: weather

    rain_sensor_today:
      name: "Today's precipitation sensor (optional)"
      description: >
        Cumulative rain sensor for today in mm.
        If not available, rain data from the weather entity forecast will be used.
      default: ""
      selector:
        entity:
          domain: sensor

    # --- Configuration thresholds ---
    temperature_normale:
      name: "Normal reference temperature"
      description: "Temperature considered normal for Belgium (°C)"
      default: 22
      selector:
        number:
          min: 15
          max: 35
          unit_of_measurement: "°C"

    temperature_canicule:
      name: "Heatwave threshold"
      description: "Above this temperature, heatwave mode is activated"
      default: 30
      selector:
        number:
          min: 30
          max: 45
          unit_of_measurement: "°C"

    rain_cancel_threshold:
      name: "Rain to cancel watering (mm)"
      description: "If rain >= this threshold, watering is cancelled"
      default: 5
      selector:
        number:
          min: 1
          max: 30
          unit_of_measurement: "mm"

    rain_reduction_threshold:
      name: "Rain to reduce watering (mm)"
      description: "If rain >= this threshold, watering is reduced"
      default: 2
      selector:
        number:
          min: 0.5
          max: 15
          step: 0.5
          unit_of_measurement: "mm"

    base_duration_minutes:
      name: "Base duration (minutes)"
      description: "Watering duration for a normal day (60 = daily needs)"
      default: 60
      selector:
        number:
          min: 10
          max: 120
          unit_of_measurement: "min"

    max_duration_minutes:
      name: "Maximum duration (minutes)"
      description: "Max watering duration even during heatwave"
      default: 120
      selector:
        number:
          min: 60
          max: 180
          unit_of_measurement: "min"

    min_duration_minutes:
      name: "Minimum duration (minutes)"
      description: "Min watering duration (if not cancelled)"
      default: 15
      selector:
        number:
          min: 5
          max: 60
          unit_of_measurement: "min"

    dry_days_counter:
      name: "Consecutive dry days counter (helper)"
      description: >
        An input_number helper that tracks consecutive days without significant rain.
        Create an input_number helper (0-30) in HA.
        Example ID: input_number.dry_days_counter
      selector:
        entity:
          domain: input_number

    water_volume_sensor:
      name: "Water volume sensor (SONOFF SWV)"
      description: >
        The water consumption sensor exposed by your SONOFF SWV valve.
        In Zigbee2MQTT: sensor.<name>_water_consumed
        Reports cumulative liters since last reset.
      selector:
        entity:
          domain: sensor

    cumulative_liters_counter:
      name: "Cumulative water usage counter (optional)"
      description: >
        An input_number helper to track total liters used over time.
        Create an input_number helper (0-99999) in HA. Leave empty to skip.
        Example ID: input_number.watering_cumulative_liters
      default: ""
      selector:
        entity:
          domain: input_number

    current_status:
      name: "Current status display (optional)"
      description: >
        An input_text helper to store current watering status for dashboard display.
        Create an input_text helper (max 255 chars) in HA. Leave empty to skip.
        Example ID: input_text.watering_current_status
      default: ""
      selector:
        entity:
          domain: input_text

    watering_history:
      name: "Watering history (optional)"
      description: >
        An input_text helper to store last 5 watering sessions summary.
        Create an input_text helper (max 255 chars) in HA. Leave empty to skip.
        Example ID: input_text.watering_history
      default: ""
      selector:
        entity:
          domain: input_text

    enable_notifications:
      name: "Enable notifications"
      description: "Send a notification with the watering summary"
      default: true
      selector:
        boolean: {}

    notification_service:
      name: "Notification service"
      description: "E.g.: notify.mobile_app_my_phone"
      default: "notify.notify"
      selector:
        text: {}

mode: single
max_exceeded: silent

trigger:
  - platform: time
    at: !input watering_time

variables:
  # Inputs
  temp_normale: !input temperature_normale
  temp_canicule: !input temperature_canicule
  duree_base: !input base_duration_minutes
  duree_max: !input max_duration_minutes
  duree_min: !input min_duration_minutes
  seuil_annulation: !input rain_cancel_threshold
  seuil_reduction: !input rain_reduction_threshold
  notif_active: !input enable_notifications
  notif_service: !input notification_service
  weather_ent: !input weather_entity
  rain_sensor: !input rain_sensor_today
  trigger_compteur: !input dry_days_counter
  capteur_volume: !input water_volume_sensor
  compteur_litres: !input cumulative_liters_counter
  statut_helper: !input current_status
  historique_helper: !input watering_history

  # Sensor values from weather entity attributes
  temperature: "{{ state_attr(weather_ent, 'temperature') | float(25) }}"
  humidite: "{{ state_attr(weather_ent, 'humidity') | float(50) }}"
  vent: "{{ state_attr(weather_ent, 'wind_speed') | float(0) }}"
  weather_condition: "{{ states(weather_ent) }}"

  # Rain: use dedicated sensor if available, otherwise estimate from weather condition
  pluie_jour: >
    {% if rain_sensor != '' %}
      {{ states(rain_sensor) | float(0) }}
    {% elif weather_condition in ['rainy', 'pouring'] %}
      6
    {% elif weather_condition in ['lightning-rainy'] %}
      8
    {% else %}
      0
    {% endif %}

  # Rain forecast: check if weather condition suggests upcoming rain
  # IRM KMI exposes forecast data - we use the current condition as proxy
  prevision_pluie: >
    {% if weather_condition in ['rainy', 'pouring', 'lightning-rainy'] %}
      80
    {% elif weather_condition in ['partlycloudy', 'cloudy', 'fog'] %}
      30
    {% else %}
      0
    {% endif %}

  jours_sans_pluie: "{{ states(trigger_compteur) | float(0) }}"

  # --- WATERING COEFFICIENT CALCULATION ---

  # Temperature factor: +2% per degree above normal, -2% below
  coef_temperature: >
    {{ 1 + ((temperature - temp_normale) * 0.02) }}

  # Humidity factor: dry air = more watering, humid air = less
  # Reference 50%. Each 10% below = +10% watering
  coef_humidite: >
    {{ 1 + ((50 - humidite) * 0.01) }}

  # Wind factor: wind increases evaporation
  # +5% per 10 km/h
  coef_vent: >
    {{ 1 + (vent / 10 * 0.05) }}

  # Consecutive dry days factor: cumulative soil drying
  # +8% per consecutive day without significant rain
  coef_jours_sans_pluie: >
    {{ 1 + (jours_sans_pluie * 0.08) }}

  # Rain factor: proportional reduction
  coef_pluie: >
    {% if pluie_jour >= seuil_annulation %}
      0
    {% elif pluie_jour >= seuil_reduction %}
      {{ 1 - (pluie_jour / seuil_annulation) }}
    {% else %}
      1
    {% endif %}

  # Rain forecast factor (if probability > 70% or > 5mm forecasted, reduce)
  coef_prevision: >
    {% if prevision_pluie > 70 %}
      0.5
    {% elif prevision_pluie > 40 %}
      0.75
    {% else %}
      1
    {% endif %}

  # Global coefficient
  coef_global: >
    {{ (coef_temperature * coef_humidite * coef_vent * coef_jours_sans_pluie * coef_pluie * coef_prevision) | round(2) }}

  # Calculated duration
  duree_calculee: >
    {% set d = (duree_base * coef_global) | round(0) %}
    {% if coef_pluie == 0 %}
      0
    {% elif d > duree_max %}
      {{ duree_max }}
    {% elif d < duree_min %}
      {{ duree_min }}
    {% else %}
      {{ d }}
    {% endif %}

  # For summary
  arrosage_annule: "{{ duree_calculee | int == 0 }}"
  raison_annulation: >
    {% if pluie_jour >= seuil_annulation %}
      Sufficient rain today ({{ pluie_jour }}mm)
    {% else %}
      Normal conditions
    {% endif %}

condition: []

action:
  # --- Update consecutive dry days counter ---
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ pluie_jour | float(0) >= seuil_reduction }}"
        sequence:
          - action: input_number.set_value
            target:
              entity_id: !input dry_days_counter
            data:
              value: 0
    default:
      - action: input_number.increment
        target:
          entity_id: !input dry_days_counter

  # --- Watering or cancellation ---
  - choose:
      # CASE 1: Watering cancelled (too much rain)
      - conditions:
          - condition: template
            value_template: "{{ arrosage_annule }}"
        sequence:
          # Update status
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ statut_helper != '' }}"
                sequence:
                  - action: input_text.set_value
                    target:
                      entity_id: "{{ statut_helper }}"
                    data:
                      value: "❌ Cancelled: {{ raison_annulation }} ({{ now().strftime('%d/%m %H:%M') }})"
            default: []

          # Send notification
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ notif_active }}"
                sequence:
                  - action: "{{ notif_service }}"
                    data:
                      title: "🌧️ Watering cancelled"
                      message: >
                        Watering cancelled: {{ raison_annulation }}.
                        Temperature: {{ temperature }}°C | Humidity: {{ humidite }}%
                        Rain: {{ pluie_jour }}mm | Condition: {{ weather_condition }}
            default: []

    # CASE 2: Adaptive watering
    default:
      # Capture volume before watering
      - variables:
          volume_avant: "{{ states(capteur_volume) | float(0) }}"

      # Update status: in progress
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ statut_helper != '' }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: "{{ statut_helper }}"
                data:
                  value: "🚿 In progress: {{ duree_calculee }}min ({{ now().strftime('%d/%m %H:%M') }})"
        default: []

      # Start notification
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ notif_active }}"
            sequence:
              - action: "{{ notif_service }}"
                data:
                  title: "🌱 Smart watering started"
                  message: >
                    Duration: {{ duree_calculee }} min (base {{ duree_base }} min × coef {{ coef_global }})
                    📊 Details:
                    🌡️ Temp: {{ temperature }}°C (coef {{ coef_temperature | round(2) }})
                    💧 Humidity: {{ humidite }}% (coef {{ coef_humidite | round(2) }})
                    🌬️ Wind: {{ vent }} km/h (coef {{ coef_vent | round(2) }})
                    ☀️ Dry days: {{ jours_sans_pluie }} (coef {{ coef_jours_sans_pluie | round(2) }})
                    🌧️ Rain: {{ pluie_jour }}mm (coef {{ coef_pluie | round(2) }})
                    🔮 Forecast: {{ prevision_pluie }}% (coef {{ coef_prevision }})
                    ⛅ Condition: {{ weather_condition }}
        default: []

      # Turn on watering
      - action: switch.turn_on
        target:
          entity_id: !input watering_switch

      # Wait for calculated duration
      - delay:
          minutes: "{{ duree_calculee | int }}"

      # Turn off watering
      - action: switch.turn_off
        target:
          entity_id: !input watering_switch

      # Small delay to let sensor update after valve closes
      - delay:
          seconds: 10

      # Capture volume after watering and calculate delta
      - variables:
          volume_apres: "{{ states(capteur_volume) | float(0) }}"
          litres_session: "{{ (volume_apres - volume_avant) | round(1) }}"
          summary_line: "{{ now().strftime('%d/%m') }}: {{ duree_calculee }}min, {{ litres_session }}L, {{ temperature }}°C"

      # Update status: completed
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ statut_helper != '' }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: "{{ statut_helper }}"
                data:
                  value: "✅ Completed: {{ litres_session }}L in {{ duree_calculee }}min ({{ now().strftime('%d/%m %H:%M') }})"
        default: []

      # Update history (keep last 5 sessions)
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ historique_helper != '' }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: "{{ historique_helper }}"
                data:
                  value: >
                    {% set old = states(historique_helper) %}
                    {% if old == 'unknown' or old == '' %}
                      {{ summary_line }}
                    {% else %}
                      {% set lines = old.split(' | ') %}
                      {% set new_lines = ([summary_line] + lines)[:5] %}
                      {{ new_lines | join(' | ') }}
                    {% endif %}
        default: []

      # End notification
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ notif_active }}"
            sequence:
              - action: "{{ notif_service }}"
                data:
                  title: "✅ Watering complete"
                  message: >
                    Watering finished after {{ duree_calculee }} minutes.
                    💦 Water used: {{ litres_session }} L (measured by SWV)
                    Next watering tomorrow.
        default: []

      # Update cumulative liters counter if configured
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ compteur_litres != '' }}"
            sequence:
              - action: input_number.set_value
                target:
                  entity_id: "{{ compteur_litres }}"
                data:
                  value: "{{ (states(compteur_litres) | float(0) + litres_session | float(0)) | round(1) }}"
        default: []

