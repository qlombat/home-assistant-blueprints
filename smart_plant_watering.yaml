blueprint:
  name: "Smart Adaptive Plant Watering"
  description: >
    Intelligent automatic watering that adapts duration based on:
    - Current and forecasted temperature
    - Number of consecutive dry days (no significant rain)
    - Relative humidity
    - Recent or forecasted rain
    - Wind speed (evaporation)
    
    Configurable baseline duration (default 60min) is multiplied by environmental coefficients.
    Example: 60min base × 1.5 total coefficient = 90min actual watering.
    
    Uses a weather entity (e.g. IRM KMI Belgium) as data source.
  domain: automation
  input:
    # --- Control entities ---
    watering_switch:
      name: "Watering Switch/Valve"
      description: "The switch entity that controls watering"
      selector:
        entity:
          domain: switch

    # --- Trigger ---
    watering_time:
      name: "Watering time"
      description: "Trigger time (early morning recommended)"
      default: "06:00:00"
      selector:
        time: {}

    # --- Weather source ---
    weather_entity:
      name: "Weather entity"
      description: >
        Weather integration entity (e.g. weather.irm_kmi_home for IRM Belgium,
        or weather.openweathermap). Must provide temperature, humidity, wind_speed attributes.
      default: "weather.irm_kmi_home"
      selector:
        entity:
          domain: weather

    rain_sensor_today:
      name: "Today's precipitation sensor (optional)"
      description: >
        Cumulative rain sensor for today in mm.
        
        OPTION 1 (Best): Use a physical rain gauge sensor (e.g. Netatmo, Bresser).
        
        OPTION 2 (Recommended): Use an input_number helper combined with the
        built-in rain accumulator (enable "Auto rain accumulator" below).
        Create: input_number.daily_rain_estimate (0-100mm, step 0.1).
        This blueprint will automatically estimate and accumulate rainfall
        every hour, and reset it at midnight.
        
        OPTION 3: Leave empty to use simple current-condition estimation
        (least accurate, only looks at weather state at trigger time).
      default: ""
      selector:
        entity:
          domain:
            - sensor
            - input_number

    enable_rain_accumulator:
      name: "Auto rain accumulator (rolling 12h window)"
      description: >
        Automatically accumulate rainfall over a rolling 12-hour window
        in the helper above. Combined with the 12h weather forecast used
        for watering decisions, this gives a 24h view centered on the
        watering time (12h past + 12h future).
        
        How it works:
        - Every hour, reads the precipitation (real sensor or estimation)
        - Adds it to the helper after applying a decay factor (×11/12)
          so the rolling window naturally slides over time
        - NO midnight reset: the value smoothly reflects the last ~12 hours
        
        Requires "Today's precipitation sensor" above to be set to an
        input_number helper.
      default: false
      selector:
        boolean: {}

    precipitation_rate_sensor:
      name: "Current precipitation rate sensor (optional)"
      description: >
        Sensor providing the CURRENT precipitation rate in mm/h.
        Used by the rain accumulator (above) to get REAL rainfall instead
        of estimating from weather condition.
        
        Examples by integration:
        - IRM KMI (Belgium): sensor.irm_kmi_home_current_rain_intensity
        - OpenWeatherMap: sensor.openweathermap_rain
        - Met.no: sensor.<name>_precipitation
        
        Leave empty to fall back to condition-based estimation.
      default: ""
      selector:
        entity:
          domain: sensor

    # --- Configuration thresholds ---
    temperature_normale:
      name: "Normal reference temperature"
      description: "Temperature considered normal for Belgium (°C)"
      default: 22
      selector:
        number:
          min: 15
          max: 35
          unit_of_measurement: "°C"

    temperature_canicule:
      name: "Heatwave threshold"
      description: "Above this temperature, heatwave mode is activated"
      default: 30
      selector:
        number:
          min: 30
          max: 45
          unit_of_measurement: "°C"

    rain_cancel_threshold:
      name: "Rain to cancel watering (mm)"
      description: "If rain >= this threshold, watering is cancelled"
      default: 5
      selector:
        number:
          min: 1
          max: 30
          unit_of_measurement: "mm"

    rain_reduction_threshold:
      name: "Rain to reduce watering (mm)"
      description: "If rain >= this threshold, watering is reduced"
      default: 2
      selector:
        number:
          min: 0.5
          max: 15
          step: 0.5
          unit_of_measurement: "mm"

    base_duration_minutes:
      name: "Base duration (minutes)"
      description: >
        Baseline watering duration for a normal day with ideal conditions.
        This is your reference point: all coefficients multiply this value.
        Recommended: 60min = 1h daily watering needs for most plants.
        Adjust based on your soil type, plant needs, and irrigation flow rate.
      default: 60
      selector:
        number:
          min: 5
          max: 240
          step: 5
          unit_of_measurement: "min"

    max_duration_minutes:
      name: "Maximum duration (minutes)"
      description: >
        Maximum watering duration cap, even during extreme conditions.
        Safety limit to prevent over-watering or valve malfunction.
        Should be at least 2x your base duration.
      default: 120
      selector:
        number:
          min: 30
          max: 480
          step: 10
          unit_of_measurement: "min"

    min_duration_minutes:
      name: "Minimum duration (minutes)"
      description: "Min watering duration (if not cancelled)"
      default: 15
      selector:
        number:
          min: 5
          max: 60
          unit_of_measurement: "min"

    dry_days_counter:
      name: "Consecutive dry days counter (helper)"
      description: >
        An input_number helper that tracks consecutive days without significant rain.
        Create an input_number helper (0-30) in HA.
        Suggested ID: input_number.smart_watering_dry_days
      selector:
        entity:
          domain: input_number

    water_volume_sensor:
      name: "Water volume sensor (SONOFF SWV)"
      description: >
        The water consumption sensor exposed by your SONOFF SWV valve.
        In Zigbee2MQTT: sensor.<name>_water_consumed
        Reports cumulative liters since last reset.
      selector:
        entity:
          domain: sensor

    cumulative_liters_counter:
      name: "Cumulative water usage counter (optional)"
      description: >
        An input_number helper to track total liters used over time.
        Create an input_number helper (0-99999) in HA. Leave empty to skip.
        Suggested ID: input_number.smart_watering_total_liters
      default: ""
      selector:
        entity:
          domain: input_number

    current_status:
      name: "Current status display (optional)"
      description: >
        An input_text helper to store current watering status for dashboard display.
        Create an input_text helper (max 255 chars) in HA. Leave empty to skip.
        Suggested ID: input_text.smart_watering_status
      default: ""
      selector:
        entity:
          domain: input_text

    watering_history:
      name: "Watering history (optional)"
      description: >
        An input_text helper to store last 5 watering sessions summary.
        Create an input_text helper (max 255 chars) in HA. Leave empty to skip.
        Suggested ID: input_text.smart_watering_history
      default: ""
      selector:
        entity:
          domain: input_text

    enable_notifications:
      name: "Enable notifications"
      description: "Send a notification with the watering summary"
      default: true
      selector:
        boolean: {}

    enable_persistent_notifications:
      name: "Enable persistent notifications"
      description: "Show persistent notifications in Home Assistant UI (notifications panel)"
      default: true
      selector:
        boolean: {}

    notification_service:
      name: "Notification service"
      description: "E.g.: notify.mobile_app_my_phone"
      default: "notify.notify"
      selector:
        text: {}

mode: queued
max: 10
max_exceeded: silent

trigger:
  # Main watering trigger
  - platform: time
    at: !input watering_time
    id: "watering"

  # Rolling rain accumulator: check every hour
  - platform: time_pattern
    minutes: 0
    id: "rain_accumulate"

variables:
  # Inputs
  normal_temp: !input temperature_normale
  heatwave_temp: !input temperature_canicule
  base_duration: !input base_duration_minutes
  max_duration: !input max_duration_minutes
  min_duration: !input min_duration_minutes
  cancel_threshold: !input rain_cancel_threshold
  reduction_threshold: !input rain_reduction_threshold
  notif_enabled: !input enable_notifications
  persistent_notif_enabled: !input enable_persistent_notifications
  notif_service: !input notification_service
  weather_entity: !input weather_entity
  rain_sensor: !input rain_sensor_today
  rain_accumulator_enabled: !input enable_rain_accumulator
  precip_rate_sensor: !input precipitation_rate_sensor
  dry_days_counter: !input dry_days_counter
  volume_sensor: !input water_volume_sensor
  liters_counter: !input cumulative_liters_counter
  status_helper: !input current_status
  history_helper: !input watering_history

  # Sensor values from weather entity attributes
  temperature: "{{ state_attr(weather_entity, 'temperature') | float(25) }}"
  humidity: "{{ state_attr(weather_entity, 'humidity') | float(50) }}"
  wind_speed: "{{ state_attr(weather_entity, 'wind_speed') | float(0) }}"
  weather_condition: "{{ states(weather_entity) }}"

  dry_days: "{{ states(dry_days_counter) | float(0) }}"

condition: []

action:
  - choose:
      # ============================================================
      # BRANCH 1: Rolling 12h rain accumulator (hourly)
      # Uses exponential decay (×11/12 per hour) to approximate a
      # 12h sliding window. No midnight reset needed.
      # ============================================================
      - conditions:
          - condition: trigger
            id: "rain_accumulate"
          - condition: template
            value_template: "{{ rain_accumulator_enabled and rain_sensor != '' }}"
        sequence:
          - variables:
              # Get REAL precipitation rate (mm/h) from sensor if provided,
              # otherwise fallback to weather-condition based estimation.
              hourly_rain: >
                {% if precip_rate_sensor != '' and states(precip_rate_sensor) not in ['unknown', 'unavailable', 'none'] %}
                  {{ states(precip_rate_sensor) | float(0) }}
                {% else %}
                  {% set c = states(weather_entity) %}
                  {% set h = state_attr(weather_entity, 'humidity') | float(50) %}
                  {% if c in ['pouring', 'lightning-rainy'] %}2.5
                  {% elif c == 'rainy' %}1.0
                  {% elif c == 'snowy-rainy' %}0.5
                  {% elif c in ['cloudy', 'fog'] and h > 90 %}0.2
                  {% elif c == 'partlycloudy' and h > 85 %}0.1
                  {% else %}0
                  {% endif %}
                {% endif %}
              current_total: "{{ states(rain_sensor) | float(0) }}"
              # Decay old value by 1/12 each hour => rolling 12h window
              decayed: "{{ (current_total * (11 / 12)) | round(2) }}"
              new_total: "{{ ((decayed | float(0)) + (hourly_rain | float(0))) | round(1) }}"
          - action: input_number.set_value
            target:
              entity_id: "{{ rain_sensor }}"
            data:
              value: "{{ new_total }}"

      # ============================================================
      # BRANCH 2: Main watering logic
      # ============================================================
      - conditions:
          - condition: trigger
            id: "watering"
        sequence:
          # --- Get weather forecast data (HA 2023.9+) ---
          - action: weather.get_forecasts
            data:
              type: hourly
            target:
              entity_id: !input weather_entity
            response_variable: forecast_response

          # Compute rain_today (sensor/helper if set, otherwise simple fallback)
          - variables:
              rain_today_raw: >
                {% if rain_sensor != '' %}
                  {{ states(rain_sensor) | float(0) }}
                {% else %}
                  {% set c = weather_condition %}
                  {% if c in ['pouring', 'lightning-rainy'] %}5
                  {% elif c == 'rainy' %}2
                  {% elif c == 'snowy-rainy' %}1
                  {% elif c in ['cloudy', 'fog'] and humidity > 85 %}0.5
                  {% else %}0
                  {% endif %}
                {% endif %}

          # Compute forecast variables + all coefficients in a single block
          - variables:
              forecast_data: "{{ forecast_response[weather_entity].forecast }}"

              # Total REAL precipitation forecast for NEXT 12 hours
              forecast_rain_12h: >
                {% set ns = namespace(total=0) %}
                {% if forecast_data is not none and forecast_data is iterable %}
                  {% for f in forecast_data[:12] %}
                    {% if f.precipitation is defined %}
                      {% set ns.total = ns.total + (f.precipitation | float(0)) %}
                    {% endif %}
                  {% endfor %}
                {% endif %}
                {{ ns.total | round(1) }}

              # Number of rainy periods in next 6 forecast hours
              forecast_rainy_periods: >
                {% set rain_conditions = ['rainy', 'pouring', 'lightning-rainy', 'snowy-rainy'] %}
                {% set ns = namespace(count=0) %}
                {% if forecast_data is not none and forecast_data is iterable %}
                  {% for f in forecast_data[:6] %}
                    {% if f.condition is defined and f.condition in rain_conditions %}
                      {% set ns.count = ns.count + 1 %}
                    {% endif %}
                  {% endfor %}
                {% endif %}
                {{ ns.count }}

              rain_today: "{{ rain_today_raw | float(0) }}"

          # Coefficients computed in their own block so they can reference
          # forecast_rain_12h / forecast_rainy_periods / rain_today
          - variables:
              rain_probability: >
                {% set rain_forecast = forecast_rain_12h | float(0) %}
                {% set rainy_conditions = forecast_rainy_periods | int(0) %}
                {% if rain_forecast >= 5 or rainy_conditions >= 3 %}80
                {% elif rain_forecast >= 2 or rainy_conditions >= 2 %}60
                {% elif rain_forecast >= 1 or rainy_conditions >= 1 %}40
                {% elif weather_condition in ['partlycloudy', 'cloudy', 'fog'] %}20
                {% else %}0
                {% endif %}
              temp_coef: "{{ 1 + ((temperature - normal_temp) * 0.02) }}"
              humidity_coef: "{{ 1 + ((50 - humidity) * 0.01) }}"
              wind_coef: "{{ 1 + (wind_speed / 10 * 0.05) }}"
              dry_days_coef: "{{ 1 + (dry_days * 0.08) }}"
              rain_coef: >
                {% if rain_today | float(0) >= cancel_threshold %}0
                {% elif rain_today | float(0) >= reduction_threshold %}{{ 1 - (rain_today | float(0) / cancel_threshold) }}
                {% else %}1
                {% endif %}
              forecast_coef: >
                {% if rain_probability | float(0) > 70 %}0.5
                {% elif rain_probability | float(0) > 40 %}0.75
                {% else %}1
                {% endif %}

          - variables:
              global_coef: >
                {{ (temp_coef | float * humidity_coef | float * wind_coef | float *
                    dry_days_coef | float * rain_coef | float * forecast_coef | float)
                   | round(2) }}
              calculated_duration: >
                {% set d = (base_duration * (global_coef | float)) | round(0) %}
                {% if (rain_coef | float) == 0 %}0
                {% elif d > max_duration %}{{ max_duration }}
                {% elif d < min_duration %}{{ min_duration }}
                {% else %}{{ d }}
                {% endif %}
              watering_cancelled: "{{ (calculated_duration | int) == 0 }}"
              cancel_reason: >
                {% if rain_today | float(0) >= cancel_threshold %}
                  Sufficient rain last 12h ({{ rain_today }}mm)
                {% else %}
                  Normal conditions
                {% endif %}

          # --- Update consecutive dry days counter ---
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ rain_today | float(0) >= reduction_threshold }}"
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: !input dry_days_counter
                    data:
                      value: 0
            default:
              - action: input_number.increment
                target:
                  entity_id: !input dry_days_counter

          # --- Watering or cancellation ---
          - choose:
              # CASE 1: Watering cancelled (too much rain)
              - conditions:
                  - condition: template
                    value_template: "{{ watering_cancelled }}"
                sequence:
                  # Update status
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ status_helper != '' }}"
                        sequence:
                          - action: input_text.set_value
                            target:
                              entity_id: "{{ status_helper }}"
                            data:
                              value: "❌ Cancelled: {{ cancel_reason }} ({{ now().strftime('%d/%m %H:%M') }})"
                    default: []

                  # Send notification
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ notif_enabled }}"
                        sequence:
                          - action: "{{ notif_service }}"
                            data:
                              title: "🌧️ Watering cancelled"
                              message: >
                                Watering cancelled: {{ cancel_reason }}.
                                Temperature: {{ temperature }}°C | Humidity: {{ humidity }}%
                                Rain last 12h: {{ rain_today }}mm | Forecast next 12h: {{ forecast_rain_12h }}mm
                                Condition: {{ weather_condition }}
                    default: []

                  # Persistent notification for Home Assistant UI
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ persistent_notif_enabled }}"
                        sequence:
                          - action: persistent_notification.create
                            data:
                              notification_id: "smart_watering_status"
                              title: "🌧️ Arrosage annulé"
                              message: >
                                **Arrosage annulé:** {{ cancel_reason }}

                                📊 **Fenêtre 24h (12h passées + 12h à venir):**
                                - 🌧️ Pluie dernières 12h: {{ rain_today }}mm
                                - 🔮 Prévision 12h à venir: {{ forecast_rain_12h }}mm

                                🌡️ **Conditions actuelles:**
                                - Température: {{ temperature }}°C
                                - Humidité: {{ humidity }}%
                                - Condition: {{ weather_condition }}

                                ⏰ {{ now().strftime('%d/%m/%Y à %H:%M') }}
                    default: []

            # CASE 2: Adaptive watering
            default:
              # Capture volume before watering
              - variables:
                  volume_before: "{{ states(volume_sensor) | float(0) }}"

              # Update status: in progress
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ status_helper != '' }}"
                    sequence:
                      - action: input_text.set_value
                        target:
                          entity_id: "{{ status_helper }}"
                        data:
                          value: "🚿 In progress: {{ calculated_duration }}min ({{ now().strftime('%d/%m %H:%M') }})"
                default: []

              # Start notification
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ notif_enabled }}"
                    sequence:
                      - action: "{{ notif_service }}"
                        data:
                          title: "🌱 Smart watering started"
                          message: >
                            Duration: {{ calculated_duration }} min (base {{ base_duration }} min × coef {{ global_coef }})
                            📊 Details:
                            🌡️ Temp: {{ temperature }}°C (coef {{ temp_coef | float | round(2) }})
                            💧 Humidity: {{ humidity }}% (coef {{ humidity_coef | float | round(2) }})
                            🌬️ Wind: {{ wind_speed }} km/h (coef {{ wind_coef | float | round(2) }})
                            ☀️ Dry days: {{ dry_days }} (coef {{ dry_days_coef | float | round(2) }})
                            🌧️ Rain last 12h: {{ rain_today }}mm | Forecast 12h: {{ forecast_rain_12h }}mm (coef {{ rain_coef | float | round(2) }})
                            🔮 Forecast probability: {{ rain_probability }}% (coef {{ forecast_coef }})
                            ⛅ Condition: {{ weather_condition }}
                default: []

              # Persistent notification for Home Assistant UI
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ persistent_notif_enabled }}"
                    sequence:
                      - action: persistent_notification.create
                        data:
                          notification_id: "smart_watering_status"
                          title: "🌱 Arrosage intelligent en cours"
                          message: >
                            ⏱️ **Durée:** {{ calculated_duration }} min (base {{ base_duration }} min × coef {{ global_coef }})

                            🌧️ **Fenêtre 24h:**
                            - Pluie 12h passées: {{ rain_today }}mm → coef {{ rain_coef | float | round(2) }}
                            - Prévision 12h à venir: {{ forecast_rain_12h }}mm → {{ rain_probability }}% (coef {{ forecast_coef }})

                            📊 **Autres coefficients:**
                            - 🌡️ Température: {{ temperature }}°C → coef {{ temp_coef | float | round(2) }}
                            - 💧 Humidité: {{ humidity }}% → coef {{ humidity_coef | float | round(2) }}
                            - 🌬️ Vent: {{ wind_speed }} km/h → coef {{ wind_coef | float | round(2) }}
                            - ☀️ Jours secs: {{ dry_days }} → coef {{ dry_days_coef | float | round(2) }}

                            ⛅ **Condition:** {{ weather_condition }}

                            🚿 Démarré à {{ now().strftime('%H:%M') }}
                default: []

              # Turn on watering
              - action: switch.turn_on
                target:
                  entity_id: !input watering_switch

              # Wait for calculated duration
              - delay:
                  minutes: "{{ calculated_duration | int }}"

              # Turn off watering
              - action: switch.turn_off
                target:
                  entity_id: !input watering_switch

              # Small delay to let sensor update after valve closes
              - delay:
                  seconds: 10

              # Capture volume after watering and calculate delta
              - variables:
                  volume_after: "{{ states(volume_sensor) | float(0) }}"
                  session_liters: "{{ (volume_after - volume_before) | round(1) }}"
                  summary_line: "{{ now().strftime('%d/%m') }}: {{ calculated_duration }}min, {{ session_liters }}L, {{ temperature }}°C"

              # Update status: completed
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ status_helper != '' }}"
                    sequence:
                      - action: input_text.set_value
                        target:
                          entity_id: "{{ status_helper }}"
                        data:
                          value: "✅ Completed: {{ session_liters }}L in {{ calculated_duration }}min ({{ now().strftime('%d/%m %H:%M') }})"
                default: []

              # Update history (keep last 5 sessions)
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ history_helper != '' }}"
                    sequence:
                      - action: input_text.set_value
                        target:
                          entity_id: "{{ history_helper }}"
                        data:
                          value: >
                            {% set old = states(history_helper) %}
                            {% if old == 'unknown' or old == '' %}
                              {{ summary_line }}
                            {% else %}
                              {% set lines = old.split(' | ') %}
                              {% set new_lines = ([summary_line] + lines)[:5] %}
                              {{ new_lines | join(' | ') }}
                            {% endif %}
                default: []

              # End notification
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ notif_enabled }}"
                    sequence:
                      - action: "{{ notif_service }}"
                        data:
                          title: "✅ Watering complete"
                          message: >
                            Watering finished after {{ calculated_duration }} minutes.
                            💦 Water used: {{ session_liters }} L (measured by SWV)
                            Next watering tomorrow.
                default: []

              # Persistent notification for Home Assistant UI
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ persistent_notif_enabled }}"
                    sequence:
                      - action: persistent_notification.create
                        data:
                          notification_id: "smart_watering_status"
                          title: "✅ Arrosage terminé"
                          message: >
                            ⏱️ **Durée:** {{ calculated_duration }} minutes
                            💦 **Eau utilisée:** {{ session_liters }} L (mesuré par SWV)

                            📊 **Conditions:**
                            - 🌡️ Température: {{ temperature }}°C
                            - 💧 Humidité: {{ humidity }}%
                            - 🌬️ Vent: {{ wind_speed }} km/h
                            - ☀️ Jours secs consécutifs: {{ dry_days }}
                            - 🌧️ Pluie 12h passées: {{ rain_today }}mm

                            🔮 **Coefficient appliqué:** {{ global_coef }}
                            ⏰ Terminé à {{ now().strftime('%H:%M') }}

                            ⏭️ Prochain arrosage demain
                default: []

              # Update cumulative liters counter if configured
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ liters_counter != '' }}"
                    sequence:
                      - action: input_number.set_value
                        target:
                          entity_id: "{{ liters_counter }}"
                        data:
                          value: "{{ (states(liters_counter) | float(0) + session_liters | float(0)) | round(1) }}"
                default: []

